name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: outrun
          POSTGRES_PASSWORD: outrun_ci_password
          POSTGRES_DB: outrun_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://outrun:outrun_ci_password@localhost:5432/outrun_ci
      BETTER_AUTH_SECRET: ci-only-secret-not-used-in-production
      BETTER_AUTH_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit + integration tests
        run: npm run test

      # docs/outrun/15 "DEPLOYMENT PIPELINE" / "SECURITY TESTING" —
      # Dependency Audits. Fails on high/critical advisories only; lower-
      # severity transitive findings with no available fix (tracked in
      # DEPLOYMENT.md) shouldn't block every PR.
      - name: Security audit
        run: npm audit --audit-level=high

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Includes tests/e2e/accessibility.spec.ts (docs/outrun/15 "CI/CD" —
      # Accessibility Checks), alongside the golden-path E2E specs.
      - name: E2E tests (incl. accessibility)
        run: npm run test:e2e
