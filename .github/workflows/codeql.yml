name: CodeQL

# docs/outrun/15 "SECURITY TESTING" — Static Analysis. Runs on the same
# triggers as CI plus a weekly schedule, so a newly-disclosed query
# pattern gets checked against the existing codebase too, not just new
# diffs.
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 3 * * 1"

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    strategy:
      matrix:
        language: ["javascript-typescript"]

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
